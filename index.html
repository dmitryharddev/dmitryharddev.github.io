<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Open in Chrome</title>
</head>
<body>
  <h1>Открываем в Chrome...</h1>
  <button onclick="reset()">Сбросить и попробовать снова</button>
  <pre id="info"></pre>

  <script>
    function reset() {
      localStorage.removeItem('opened');
      location.reload();
    }

    window.onload = function() {
      const isRealChrome = !!window.chrome;
      const alreadyOpened = localStorage.getItem('opened');

      document.getElementById('info').textContent = JSON.stringify({
        isRealChrome,
        alreadyOpened,
      }, null, 2);

      if (!isRealChrome && !alreadyOpened) {
        localStorage.setItem('opened', 'true');
        const url = window.location.href;
        const intentUrl = `intent://${url.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`;
        window.location.href = intentUrl;
      }
    }
  </script>
</body>
</html>
