<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Open in Chrome</title>
  <script>
    function openInChrome() {
      const url = window.location.href;
      
      // Android Intent для Chrome
      const intentUrl = `intent://${url.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`;
      
      window.location.href = intentUrl;
    }

    // Автоматически при загрузке
    window.onload = openInChrome;
  </script>
</head>
<body>
  <p>Открываем в Chrome...</p>
  <a href="#" onclick="openInChrome()">Открыть в Chrome</a>
</body>
</html>
