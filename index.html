<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Debug</title>
</head>
<body>
  <h1>Debug info</h1>
  <pre id="info"></pre>

  <script>
    const info = {
      userAgent: navigator.userAgent,
      hasWindowChrome: !!window.chrome,
      windowChromeKeys: window.chrome ? Object.keys(window.chrome) : 'none',
      referrer: document.referrer,
    };

    document.getElementById('info').textContent = JSON.stringify(info, null, 2);
  </script>
</body>
</html>
